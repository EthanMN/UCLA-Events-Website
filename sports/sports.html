<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UCLA Calendar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="calendar-container-wrapper">
  <div id="calendar-container">
    <div id="calendar-header">
      <button id="prev-month">◀</button>
      <h2 id="month-year">March 2026</h2>
      <button id="next-month">▶</button>
    </div>
    <div id="calendar-grid">
      <!-- Calendar days will be inserted here -->
    </div>
  </div>

  <!-- Sidebar for filters -->
  <div id="calendar-sidebar">
    <h3>Filters</h3>
    <label for="homeAwayFilter">Home/Away:</label>
    <select id="homeAwayFilter">
      <option value="all">All</option>
      <option value="Home">Home</option>
      <option value="Away">Away</option>
    </select>

    <label for="sportFilter">Sport:</label>
    <select id="sportFilter">
      <option value="all">All</option>
      <!-- dynamically populated -->
    </select>
  </div>
</div>

<div id="calendar-container">

  </div>
</div>

<script src="script.js"></script>
</body>
<small> Note: This calendar only shows ticketed UCLA Sporting events located in California. For full schedules and non-ticketed sporting events, visit the official UCLA Athletics website <a href ="https://uclabruins.com">here</a></small>
</html>
